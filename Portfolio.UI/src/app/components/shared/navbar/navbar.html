<nav
    class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-100 dark:border-zinc-900 px-8 py-5 transition-all duration-500">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <!-- Logo -->
        <a routerLink="/"
            class="text-2xl font-black tracking-tighter hover:text-red-600 transition-all active:scale-95 flex items-center gap-1 text-zinc-900 dark:text-white group">
            <div class="relative flex items-center">
                <div class="relative w-10 h-10 mr-2 group-hover:scale-110 transition-transform duration-500">
                    <div
                        class="absolute inset-0 bg-red-600 rounded-xl rotate-6 opacity-20 group-hover:rotate-12 transition-transform">
                    </div>
                    <img *ngIf="bio?.avatarUrl" [src]="bio?.avatarUrl"
                        class="relative w-full h-full object-cover rounded-xl border-2 border-white dark:border-zinc-800 shadow-lg">
                    <div *ngIf="!bio?.avatarUrl"
                        class="bg-red-600 text-white w-full h-full rounded-xl flex items-center justify-center shadow-lg shadow-red-600/20">
                        M</div>
                </div>
            </div>
            Mostafa<span class="text-red-600">.Dev</span>
        </a>

        <!-- Desktop Nav -->
        <div class="hidden md:flex items-center gap-10">
            <a routerLink="/" routerLinkActive="text-red-600 border-b-2 border-red-600"
                [routerLinkActiveOptions]="{exact: true}"
                class="text-[10px] pb-1 font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-all">Home</a>
            <a routerLink="/timeline" routerLinkActive="text-red-600 border-b-2 border-red-600"
                class="text-[10px] pb-1 font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-all">Resume</a>
            <a routerLink="/projects" routerLinkActive="text-red-600 border-b-2 border-red-600"
                class="text-[10px] pb-1 font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-all">Projects</a>
            <a routerLink="/blog" routerLinkActive="text-red-600 border-b-2 border-red-600"
                class="text-[10px] pb-1 font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-all">Social
                Feed</a>
            <a routerLink="/contact" routerLinkActive="text-red-600 border-b-2 border-red-600"
                class="text-[10px] pb-1 font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-all">Connection</a>
        </div>

        <!-- Right side actions -->
        <div class="flex items-center gap-4">
            <!-- Theme Toggle Button -->
            <button (click)="theme.toggle()"
                class="relative w-11 h-11 flex items-center justify-center rounded-2xl border border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900/60 hover:border-red-600/50 hover:bg-white dark:hover:bg-zinc-800 transition-all hover:scale-110 active:scale-95 group overflow-hidden"
                [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
                <!-- Background Glow -->
                <div
                    class="absolute inset-0 bg-gradient-to-br from-red-600/0 to-purple-600/0 group-hover:from-red-600/10 group-hover:to-purple-600/10 transition-all">
                </div>

                <!-- Moon icon shown in dark mode -->
                <lucide-icon *ngIf="theme.isDark()" [img]="MoonIcon"
                    class="w-4 h-4 text-zinc-400 group-hover:text-red-500 transition-all relative z-10"></lucide-icon>
                <!-- Sun icon shown in light mode -->
                <lucide-icon *ngIf="!theme.isDark()" [img]="SunIcon"
                    class="w-4 h-4 text-zinc-600 group-hover:text-red-500 transition-all relative z-10"></lucide-icon>
            </button>

            <!-- Auth/Admin -->
            <ng-container *ngIf="auth.isLoggedIn(); else loginBtn">
                <button (click)="auth.logout()"
                    class="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-400 hover:text-red-600 transition-colors">Logout</button>
            </ng-container>
            <ng-template #loginBtn>
                <a routerLink="/login"
                    class="hidden md:inline-flex bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 px-8 py-3 rounded-2xl text-[9px] font-black uppercase tracking-[0.4em] transition-all hover:scale-105 active:scale-95 shadow-xl hover:shadow-red-600/5">System</a>
            </ng-template>

            <!-- Mobile Hamburger -->
            <button (click)="toggleMobile()"
                class="md:hidden w-11 h-11 flex items-center justify-center rounded-2xl border border-zinc-100 dark:border-zinc-800 hover:border-red-600/50 transition-all">
                <lucide-icon [img]="mobileMenuOpen ? XIcon : MenuIcon"
                    class="w-5 h-5 text-zinc-600 dark:text-zinc-400"></lucide-icon>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="mobileMenuOpen"
        class="md:hidden mt-6 py-10 border-t border-zinc-100 dark:border-zinc-900 flex flex-col gap-8 items-center bg-white dark:bg-zinc-950 rounded-[2rem] shadow-2xl animate-fade-in-up">
        <a routerLink="/" routerLinkActive="text-red-600" [routerLinkActiveOptions]="{exact: true}"
            (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Home</a>
        <a routerLink="/timeline" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Resume</a>
        <a routerLink="/projects" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Projects</a>
        <a routerLink="/blog" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Social
            Feed</a>
        <a routerLink="/contact" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Connection</a>

        <a *ngIf="!auth.isLoggedIn()" routerLink="/login" (click)="toggleMobile()"
            class="mt-4 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl">Admin
            System</a>
    </div>
</nav>
