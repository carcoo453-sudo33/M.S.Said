<nav
    class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-100 dark:border-zinc-900 px-8 py-4 transition-all duration-500">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <!-- Logo -->
        <a routerLink="/"
            class="text-xl font-black tracking-tighter hover:text-red-600 transition-all flex items-center gap-1 text-zinc-900 dark:text-white group">
            Mostafa<span class="text-red-600">.Dev</span>
            <div
                class="bg-red-600 text-white w-7 h-7 rounded-lg flex items-center justify-center ms-2 shadow-lg shadow-red-600/20 text-xs">
                M</div>
        </a>

        <!-- Desktop Nav -->
        <div class="hidden md:flex items-center gap-8">
            <a routerLink="/" routerLinkActive="text-red-600" [routerLinkActiveOptions]="{exact: true}"
                class="text-[11px] font-bold uppercase tracking-wide text-zinc-500 hover:text-red-600 transition-all">Home</a>
            <a routerLink="/timeline" routerLinkActive="text-red-600"
                class="text-[11px] font-bold uppercase tracking-wide text-zinc-500 hover:text-red-600 transition-all">Resume</a>
            <a routerLink="/education" routerLinkActive="text-red-600"
                class="text-[11px] font-bold uppercase tracking-wide text-zinc-500 hover:text-red-600 transition-all">Education</a>
            <a routerLink="/projects" routerLinkActive="text-red-600"
                class="text-[11px] font-bold uppercase tracking-wide text-zinc-500 hover:text-red-600 transition-all">Projects</a>
            <a routerLink="/blog" routerLinkActive="text-red-600"
                class="text-[11px] font-bold uppercase tracking-wide text-zinc-500 hover:text-red-600 transition-all">Blog</a>
        </div>

        <!-- Right side actions -->
        <div class="flex items-center gap-4">
            <!-- Theme Toggle Button -->
            <button (click)="theme.toggle()"
                class="relative w-9 h-9 flex items-center justify-center rounded-xl border border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900/60 hover:border-red-600/50 transition-all hover:scale-110 active:scale-95"
                [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
                <lucide-icon *ngIf="theme.isDark()" [img]="MoonIcon"
                    class="w-4 h-4 text-zinc-400 hover:text-red-500 transition-all"></lucide-icon>
                <lucide-icon *ngIf="!theme.isDark()" [img]="SunIcon"
                    class="w-4 h-4 text-zinc-600 hover:text-red-500 transition-all"></lucide-icon>
            </button>

            <!-- Auth/Admin -->
            <ng-container *ngIf="auth.isLoggedIn(); else contactBtn">
                <button (click)="auth.logout()"
                    class="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-400 hover:text-red-600 transition-colors">Logout</button>
            </ng-container>
            <ng-template #contactBtn>
                <a routerLink="/contact"
                    class="hidden md:inline-flex items-center bg-red-600 text-white px-6 py-2.5 rounded-full text-[11px] font-bold uppercase tracking-wide transition-all hover:bg-red-700 hover:scale-105 active:scale-95 shadow-md shadow-red-600/20">Connection</a>
            </ng-template>

            <!-- Mobile Hamburger -->
            <button (click)="toggleMobile()"
                class="md:hidden w-9 h-9 flex items-center justify-center rounded-xl border border-zinc-100 dark:border-zinc-800 hover:border-red-600/50 transition-all">
                <lucide-icon [img]="mobileMenuOpen ? XIcon : MenuIcon"
                    class="w-5 h-5 text-zinc-600 dark:text-zinc-400"></lucide-icon>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="mobileMenuOpen"
        class="md:hidden mt-6 py-10 border-t border-zinc-100 dark:border-zinc-900 flex flex-col gap-8 items-center bg-white dark:bg-zinc-950 rounded-[2rem] shadow-2xl animate-fade-in-up">
        <a routerLink="/" routerLinkActive="text-red-600" [routerLinkActiveOptions]="{exact: true}"
            (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Home</a>
        <a routerLink="/timeline" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Resume</a>
        <a routerLink="/education" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Education</a>
        <a routerLink="/projects" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Projects</a>
        <a routerLink="/blog" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Blog</a>
        <a routerLink="/contact" routerLinkActive="text-red-600" (click)="toggleMobile()"
            class="text-[12px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-600 transition-colors">Connection</a>

        <a *ngIf="!auth.isLoggedIn()" routerLink="/login" (click)="toggleMobile()"
            class="mt-4 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 px-10 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-xl">Admin
            System</a>
    </div>
</nav>
