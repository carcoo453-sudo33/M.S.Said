<app-navbar></app-navbar>
<main *ngIf="post" class="min-h-screen bg-zinc-950 text-white pt-32 pb-20 overflow-hidden">
    <!-- Article Header -->
    <div class="max-w-4xl mx-auto px-6 mb-16 relative">
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-red-600/10 rounded-full blur-[120px]"></div>

        <a routerLink="/blog"
            class="text-zinc-500 hover:text-red-500 font-bold mb-10 inline-flex items-center gap-2 text-xs uppercase tracking-widest transition-colors mb-12">
            <lucide-icon [img]="ArrowLeftIcon" class="w-4 h-4"></lucide-icon> Back to Insights
        </a>

        <div class="flex items-center gap-4 mb-8 text-xs font-bold text-red-500 uppercase tracking-[0.2em]">
            <span>{{ post.publishedAt | date:'MMMM d, y' }}</span>
            <span class="w-1 h-1 bg-zinc-800 rounded-full"></span>
            <span>By {{ post.author }}</span>
        </div>

        <h1 class="text-5xl md:text-8xl font-black mb-10 tracking-tighter leading-[0.9]">{{ post.title }}</h1>

        <p
            class="text-xl md:text-2xl text-zinc-400 font-medium leading-relaxed italic border-l-4 border-red-600 pl-8 mb-12">
            {{ post.summary }}
        </p>

        <div class="flex flex-wrap gap-3">
            <span *ngFor="let tag of post.tags?.split(',')"
                class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-full text-[10px] font-bold uppercase tracking-widest text-zinc-400">
                #{{ tag.trim() }}
            </span>
        </div>
    </div>

    <!-- Feature Image -->
    <div class="max-w-6xl mx-auto px-6 mb-20">
        <div class="aspect-video w-full rounded-[4rem] overflow-hidden border border-zinc-900 shadow-2xl">
            <img [src]="post.imageUrl" [alt]="post.title" class="w-full h-full object-cover">
        </div>
    </div>

    <!-- Article Content -->
    <article class="max-w-3xl mx-auto px-6 prose prose-invert prose-red">
        <div class="text-zinc-400 leading-[1.8] text-lg space-y-8 whitespace-pre-wrap">
            {{ post.content }}
        </div>
    </article>

    <!-- Footer CTA -->
    <div class="max-w-4xl mx-auto px-6 mt-32 text-center pt-20 border-t border-zinc-900">
        <h2 class="text-3xl font-black mb-6 uppercase">Enjoyed this post?</h2>
        <div class="flex justify-center gap-6">
            <button
                class="bg-zinc-900 hover:bg-zinc-800 p-4 rounded-full border border-zinc-800 transition-all active:scale-90">
                <lucide-icon [img]="Share2Icon" class="w-5 h-5"></lucide-icon>
            </button>
            <button
                class="bg-red-600 hover:bg-red-700 font-black px-10 py-4 rounded-full uppercase tracking-widest text-xs transition-transform hover:scale-105 shadow-lg shadow-red-600/20">
                Next Article
            </button>
        </div>
    </div>
</main>
