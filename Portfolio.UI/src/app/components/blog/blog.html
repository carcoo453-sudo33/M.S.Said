<app-navbar></app-navbar>

<main
    class="min-h-screen bg-[#F4F2EE] dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 transition-colors duration-500 space-y-32">
    <div class="max-w-7xl mx-auto px-6 pt-32 space-y-32">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 lg:gap-16">

            <!-- SIDEBAR (Left) -->
            <aside class="md:col-span-4 lg:col-span-3 space-y-6">
                <!-- Profile Card -->
                <app-blog-profile-card [bio]="bio"></app-blog-profile-card>

                <!-- Platform Filter -->
                <app-blog-platform-filter [platforms]="platforms" [selectedPlatform]="selectedPlatform"
                    [counts]="platformCounts" (platformChange)="setPlatform($event)">
                </app-blog-platform-filter>

                <!-- Trending Topics -->
                <app-blog-trending-topics [topics]="trendingTopics"></app-blog-trending-topics>
            </aside>

            <!-- FEED (Right) -->
            <div class="md:col-span-8 lg:col-span-9 space-y-8">

                <!-- Feed Header -->
                <app-blog-feed-header [title]="'Latest Updates'" [viewMode]="viewMode"
                    (viewModeChange)="viewMode = $event">
                </app-blog-feed-header>

                <!-- Loading State -->
                <app-shared-skeleton *ngIf="isLoading" [count]="4" height="250px"></app-shared-skeleton>

                <!-- Posts List -->
                <div *ngIf="!isLoading" class="space-y-8">
                    <app-blog-post-card *ngFor="let post of filteredPosts; let i = index" [post]="post"
                        [delay]="(0.1 * i) + 's'" (onNavigate)="navigateToPost($event)">
                    </app-blog-post-card>

                    <!-- Load More -->
                    <div class="pt-8 text-center animate-fade-in-up">
                        <button
                            class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 text-zinc-500 dark:text-zinc-400 px-8 py-4 rounded-full font-black text-[10px] uppercase tracking-widest hover:border-red-600 hover:text-red-600 transition-all shadow-sm">
                            Load More Updates
                        </button>
                    </div>
                </div>

                <!-- Empty State -->
                <app-shared-empty-state *ngIf="!isLoading && filteredPosts.length === 0"
                    [title]="'Sector: ' + selectedPlatform"
                    message="No transmission detected in this frequency range. System awaiting new content.">
                </app-shared-empty-state>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <app-shared-footer></app-shared-footer>
</main>
