<app-navbar></app-navbar>

<main [attr.dir]="translationService.isRTL() ? 'rtl' : 'ltr'"
    class="min-h-screen bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 pt-32 transition-colors duration-500 overflow-hidden relative space-y-32">

    <!-- Animated Background Elements -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-500/5 dark:bg-purple-500/10 rounded-full blur-[120px] animate-pulse">
        </div>
        <div
            class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-pink-500/5 dark:bg-pink-500/10 rounded-full blur-[120px] animate-pulse delay-700">
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 relative z-10 space-y-32">

        <!-- Header Section -->
        <app-shared-page-header [badge]="'timeline.badge' | translate"
            [title]="('timeline.title1' | translate) + '<br><span class=\'text-transparent bg-clip-text bg-gradient-to-r from-[#FF3B7E] to-[#7000FF]\'>' + ('timeline.title2' | translate) + '</span>'"
            [description]="'timeline.description' | translate">
        </app-shared-page-header>

        <!-- SKELETON STATE -->
        <app-shared-skeleton *ngIf="isLoading()" [count]="4" height="250px"></app-shared-skeleton>

        <!-- ERROR STATE -->
        <app-shared-error-state *ngIf="!isLoading() && hasError()" [title]="'timeline.errorTitle' | translate"
            [retryText]="'timeline.retryText' | translate" (retry)="ngOnInit()">
        </app-shared-error-state>

        <!-- EMPTY STATE -->
        <app-shared-empty-state *ngIf="!isLoading() && !hasError() && experiences().length === 0" [title]="'timeline.emptyTitle' | translate"
            [message]="'timeline.emptyMessage' | translate">
        </app-shared-empty-state>

        <!-- LOADED STATE -->
        <app-timeline-list *ngIf="!isLoading() && !hasError() && experiences().length > 0"
            [experiences]="experiences()"></app-timeline-list>

        <!-- Strategic Signature Section -->
        <app-shared-signature [bio]="bio()"
            [quote]="bio()?.['timelineQuote'] || ('timeline.defaultQuote' | translate)">
        </app-shared-signature>
    </div>
</main>

<!-- Footer -->
<app-shared-footer></app-shared-footer>
