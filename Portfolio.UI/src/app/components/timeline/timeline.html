<app-navbar></app-navbar>

<main
    class="min-h-screen bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 pt-32 pb-24 transition-colors duration-500 overflow-hidden relative">

    <!-- Animated Background Elements -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-500/5 dark:bg-purple-500/10 rounded-full blur-[120px] animate-pulse">
        </div>
        <div
            class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-pink-500/5 dark:bg-pink-500/10 rounded-full blur-[120px] animate-pulse delay-700">
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 relative z-10 space-y-32">

        <!-- Header Section -->
        <app-shared-page-header badge="Operational Roadmap"
            title="PRO<br><span class='text-transparent bg-clip-text bg-gradient-to-r from-[#FF3B7E] to-[#7000FF]'>HISTORY</span>"
            description="A definitive technical chronology. Each node representing a milestone in architectural growth and system delivery.">
        </app-shared-page-header>

        <!-- SKELETON STATE -->
        <app-shared-skeleton *ngIf="isLoading" [count]="4" height="250px"></app-shared-skeleton>

        <!-- ERROR STATE -->
        <app-shared-error-state *ngIf="!isLoading && hasError" title="Chronology Link Broken"
            retryText="Restore Sequence" (retry)="ngOnInit()">
        </app-shared-error-state>

        <!-- EMPTY STATE -->
        <app-shared-empty-state *ngIf="!isLoading && !hasError && experiences.length === 0" title="Fresh Origins"
            message="New chapters of professional excellence are being drafted. Initializing history...">
        </app-shared-empty-state>

        <!-- LOADED STATE -->
        <app-timeline-list *ngIf="!isLoading && !hasError && experiences.length > 0"
            [experiences]="experiences"></app-timeline-list>

        <!-- Strategic Signature Section -->
        <app-shared-signature [bio]="bio"
            quote="Experience is the accumulation of architectural challenges solved through rigorous engineering. This timeline reflects a journey of continuous technical evolution and intentional delivery.">
        </app-shared-signature>

        <!-- Footer -->
        <app-shared-footer></app-shared-footer>
    </div>
</main>
