<app-navbar></app-navbar>

<main [attr.dir]="translationService.isRTL() ? 'rtl' : 'ltr'"
    class="min-h-screen bg-zinc-950 text-zinc-50 transition-colors duration-500 relative selection:bg-red-600 selection:text-white">

    <!-- SKELETON STATE -->
    <div *ngIf="isLoading()" class="max-w-7xl mx-auto px-6 pt-32 pb-24">
        <!-- Header Skeleton -->
        <div class="mb-6 lg:mb-8">
            <app-project-details-header-skeleton></app-project-details-header-skeleton>
        </div>

        <!-- Two Column Layout: Main Content + Sidebar -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-16">
            <!-- Main Content Area (Left Side) -->
            <div class="lg:col-span-8 space-y-16 lg:space-y-24">
                <!-- Gallery Skeleton -->
                <app-project-details-gallery-skeleton></app-project-details-gallery-skeleton>

                <!-- Specs Skeleton -->
                <app-project-details-specs-skeleton></app-project-details-specs-skeleton>
                
                <!-- Interactions Skeleton -->
                <app-project-details-interactions-skeleton></app-project-details-interactions-skeleton>
            </div>

            <!-- Sidebar (Right Side) -->
            <div class="lg:col-span-4 space-y-8">
                <!-- Features Skeleton -->
                <app-project-details-features-skeleton></app-project-details-features-skeleton>
                
                <!-- Sidebar Skeleton -->
                <app-project-details-sidebar-skeleton></app-project-details-sidebar-skeleton>
            </div>
        </div>
    </div>

    <!-- ERROR STATE -->
    <div *ngIf="!isLoading() && hasError()" class="max-w-7xl mx-auto px-6 pt-32 pb-24">
        <app-shared-error-state [title]="'projectDetails.errorTitle' | translate" [retryText]="'projectDetails.retryText' | translate"
            (retry)="loadProject()">
        </app-shared-error-state>
    </div>

    <!-- LOADED STATE - Responsive Grid Layout -->
    <div *ngIf="!isLoading() && !hasError() && project()" class="max-w-7xl mx-auto px-6 pt-32 pb-24 relative z-10">

        <!-- Header Section - Full Width -->
        <div class="mb-6 lg:mb-8">
            <app-project-details-header 
                [project]="project()"
                (onEdit)="onEditProject()"
                (onDelete)="onDeleteProject()">
            </app-project-details-header>
        </div>

        <!-- Two Column Layout: Main Content + Sidebar -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-16">
            <!-- Main Content Area (Left Side) - lg:col-span-8 -->
            <div class="lg:col-span-8 space-y-16 lg:space-y-24">

                <!-- Featured Media & Actions -->
                <app-project-details-gallery 
                    [project]="project()"
                    (onReactEvent)="onReact()"
                    (onShareEvent)="onShare()">
                </app-project-details-gallery>

                <!-- Technical Specification Bar -->
                <app-project-details-specs [project]="project()"></app-project-details-specs>
                
                <!-- Interactions & Discussion -->
                <app-project-details-interactions 
                    [project]="project()" 
                    [triggerShare]="triggerShareModal()"
                    (onReact)="onReact()" 
                    (onShare)="onShare()"
                    (onCommentAdded)="loadProject()">
                </app-project-details-interactions>
            </div>

            <!-- Sidebar (Right Side) - lg:col-span-4 -->
            <div class="lg:col-span-4">
                <!-- Features & Responsibilities -->
                <app-project-details-features [project]="project()"></app-project-details-features>
                
                <!-- Case Study Sections (Changelog, Metrics, Related) -->
                <app-project-details-sidebar [project]="project()"></app-project-details-sidebar>
            </div>
        </div>
    </div>

    <!-- Engineer Profile / Signature Section -->
    <div *ngIf="!isLoading() && !hasError() && project()" class="max-w-7xl mx-auto px-6 pb-24">
        <app-shared-signature [bio]="bio()"
            [quote]="'projectDetails.defaultQuote' | translate">
        </app-shared-signature>
    </div>

    <!-- Management Component -->
    <app-project-details-manage 
        *ngIf="project()"
        [project]="project()" 
        [canEdit]="isAuthenticated()"
        [triggerEdit]="triggerEditModal()"
        (onUpdate)="onProjectUpdate($event)">
    </app-project-details-manage>
</main>

<app-shared-footer></app-shared-footer>
