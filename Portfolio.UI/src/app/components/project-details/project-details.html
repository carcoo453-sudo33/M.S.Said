<app-navbar></app-navbar>

<main
    class="min-h-screen bg-zinc-950 text-zinc-50 pt-32 px-6 transition-colors duration-500 overflow-hidden relative selection:bg-red-600 selection:text-white space-y-32">

    <!-- SKELETON STATE -->
    <div class="max-w-7xl mx-auto">
        <app-shared-skeleton *ngIf="isLoading" [count]="3" height="400px"></app-shared-skeleton>
    </div>

    <!-- ERROR STATE -->
    <app-shared-error-state *ngIf="!isLoading && hasError" title="Project Encrypted" retryText="Restore Blueprint"
        (retry)="loadProject()">
    </app-shared-error-state>

    <!-- LOADED STATE -->
    <div *ngIf="!isLoading && !hasError && project" class="max-w-7xl mx-auto space-y-32">

        <!-- Header Section -->
        <app-project-details-header [project]="project"></app-project-details-header>

        <!-- Technical Specification Bar with extra bottom spacing -->
        <div class="pb-16">
            <app-project-details-specs [project]="project"></app-project-details-specs>
        </div>

        <!-- Featured Media & Actions -->
        <app-project-details-gallery [project]="project"></app-project-details-gallery>

        <!-- Main Content -->
        <div class="space-y-32">
            <!-- Features & Responsibilities -->
            <app-project-details-features [project]="project"></app-project-details-features>
            
            <!-- Changelog, Metrics, Related Projects in responsive grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <app-project-details-sidebar [project]="project"></app-project-details-sidebar>
            </div>
            
            <!-- Interactions & Discussion -->
            <app-project-details-interactions 
                [project]="project" 
                (onReact)="onReact()" 
                (onShare)="onShare()"
                (onCommentAdded)="loadProject()">
            </app-project-details-interactions>
        </div>
    </div>

    <!-- Engineer Profile / Signature Section -->
    <div class="max-w-7xl mx-auto">
        <app-shared-signature [bio]="bio"
            quote="This project represents a fusion of technical scalability and human-centric design. Every line of code was engineered to ensure long-term stability and high-fidelity user engagement.">
        </app-shared-signature>
    </div>

    <!-- Footer -->
    <app-shared-footer></app-shared-footer>
</main>
