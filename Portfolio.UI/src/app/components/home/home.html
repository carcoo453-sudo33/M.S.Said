<app-navbar></app-navbar>

<main
    class="min-h-screen bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 transition-colors duration-500 space-y-32">

    <!-- Hero Section -->
    <app-home-hero [bio]="bio"></app-home-hero>

    <!-- Content Grid Section -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-8 lg:gap-16 pb-24 px-6 relative z-10">

        <!-- Left Sidebar: Profile Card -->
        <app-home-sidebar-profile [bio]="bio"></app-home-sidebar-profile>

        <!-- Right Content Area -->
        <div class="md:col-span-8 space-y-32">

            <!-- Brief & Bio Section -->
            <app-home-brief-bio [bio]="bio"></app-home-brief-bio>

            <!-- Specialized Services Section -->
            <app-home-services [services]="services"></app-home-services>

            <!-- Tech Stack Section (Dynamic) -->
            <app-home-tech-stack [skills]="skills"></app-home-tech-stack>

            <!-- Featured Projects Section -->
            <app-home-featured-projects [projects]="featuredProjects"></app-home-featured-projects>

            <!-- Latest Experience Section -->
            <app-home-timeline [experiences]="experiences"></app-home-timeline>

        </div>
    </div>

    <!-- Final CTA -->
    <app-home-final-cta [bio]="bio"></app-home-final-cta>

    <!-- Footer -->
    <app-shared-footer></app-shared-footer>
</main>
