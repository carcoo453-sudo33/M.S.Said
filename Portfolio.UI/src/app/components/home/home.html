<app-navbar></app-navbar>

<main [attr.dir]="translationService.isRTL() ? 'rtl' : 'ltr'"
    class="min-h-screen text-foreground animate-theme-transition space-y-32">

    <!-- SKELETON STATE -->
    <div *ngIf="!bio()" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-5 lg:gap-5 pb-24 px-6 pt-32 relative z-10">
        <!-- Right Sidebar Skeleton (md:order-2) -->
        <app-home-sidebar-profile-skeleton class="md:col-span-4 lg:col-span-4 md:order-2"></app-home-sidebar-profile-skeleton>

        <!-- Left Content Area Skeleton (md:order-1) -->
        <div class="md:col-span-8 lg:col-span-8 space-y-16 md:order-1 pt-6">
            <app-home-brief-bio-skeleton></app-home-brief-bio-skeleton>
            <app-home-services-skeleton></app-home-services-skeleton>
            <app-home-tech-stack-skeleton></app-home-tech-stack-skeleton>
            <app-home-featured-projects-skeleton></app-home-featured-projects-skeleton>
            <app-home-timeline-skeleton></app-home-timeline-skeleton>
        </div>
    </div>

    <!-- Final CTA Skeleton -->
    <app-home-final-cta-skeleton *ngIf="!bio()"></app-home-final-cta-skeleton>

    <!-- LOADED STATE -->
    <div *ngIf="bio()" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-5 lg:gap-5 pb-24 px-6 pt-32 relative z-10">

        <!-- Right Sidebar: Profile Card (md:order-2) -->
        <app-home-sidebar-profile [bio]="bio()" (bioUpdated)="bio.set($event)"
            class="md:col-span-4 lg:col-span-4 md:order-2"></app-home-sidebar-profile>

        <!-- Left Content Area (md:order-1) -->
        <div class="md:col-span-8 lg:col-span-8 space-y-16 md:order-1 pt-6">

            <!-- Brief & Bio Section (New Hero) -->
            <app-home-brief-bio [bio]="bio()" (bioUpdated)="bio.set($event)"></app-home-brief-bio>

            <!-- Specialized Services Section -->
            <app-home-services [services]="services()" (servicesUpdated)="services.set($event)"></app-home-services>

            <!-- Tech Stack Section (Dynamic) -->
            <app-home-tech-stack [skills]="skills()" (skillsUpdated)="skills.set($event)"></app-home-tech-stack>

            <!-- Featured Projects Section -->
            <app-home-featured-projects [projects]="featuredProjects()"></app-home-featured-projects>

            <!-- Latest Experience Section -->
            <app-home-timeline [experiences]="experiences()"
                (experiencesUpdated)="experiences.set($event)"></app-home-timeline>

        </div>
    </div>

    <!-- Final CTA -->
    <app-home-final-cta *ngIf="bio()" [bio]="bio()"></app-home-final-cta>
</main>

<!-- Footer -->
<app-shared-footer></app-shared-footer>
