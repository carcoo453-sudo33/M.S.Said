<app-navbar></app-navbar>

<main [attr.dir]="translationService.isRTL() ? 'rtl' : 'ltr'"
    class="min-h-screen text-foreground animate-theme-transition">

    <div class="max-w-7xl mx-auto px-6 relative z-10">

        <!-- SKELETON STATE -->
        <div *ngIf="isLoading()" class="space-y-16">
            <!-- Page Header -->
            <div class="pt-24 pb-6">
                <div class="mb-2 text-center animate-fade-in-up">
                    <div
                        class="inline-flex items-center gap-3 px-6 py-3 rounded-full bg-primary/5 border border-primary/10 mb-8">
                        <div class="h-3 w-32 bg-muted rounded animate-pulse"></div>
                    </div>
                    <div class="h-12 w-96 mx-auto bg-muted rounded mb-10 animate-pulse"></div>
                    <div class="h-6 w-64 mx-auto bg-muted rounded animate-pulse"></div>
                </div>
            </div>

            <!-- Project Grid Skeleton -->
            <app-projects-grid-skeleton></app-projects-grid-skeleton>

            <!-- Work History Skeleton -->
            <app-projects-work-history-skeleton></app-projects-work-history-skeleton>

            <!-- Brand Slider Skeleton -->
            <app-projects-brand-slider-skeleton></app-projects-brand-slider-skeleton>

            <!-- References Skeleton -->
            <app-projects-references-skeleton></app-projects-references-skeleton>

            <!-- Bottom CTA Skeleton -->
            <app-projects-bottom-cta-skeleton></app-projects-bottom-cta-skeleton>
        </div>

        <!-- ERROR STATE -->
        <app-shared-error-state *ngIf="!isLoading() && hasError()" [title]="'projects.errorTitle' | translate"
            [retryText]="'projects.retryText' | translate" (retry)="ngOnInit()">
        </app-shared-error-state>

        <!-- EMPTY STATE -->
        <app-shared-empty-state *ngIf="!isLoading() && !hasError() && projects().length === 0"
            [title]="'projects.emptyTitle' | translate" [message]="'projects.emptyMessage' | translate">
        </app-shared-empty-state>

        <!-- LOADED STATE (with or without projects) -->
        <div *ngIf="!isLoading() && !hasError()">

            <!-- Page Header (Always shown when loaded) -->
            <div class="pt-24 pb-16">
                <app-shared-page-header [badge]="'projects.badge' | translate"
                    [title]="('projects.title1' | translate) + ' <span class=\'text-transparent bg-clip-text bg-gradient-to-r from-[#FF3B7E] to-[#7000FF]\'>' + ('projects.title2' | translate) + '</span>'"
                    [description]="'projects.description' | translate">
                </app-shared-page-header>

                <!-- Admin Action -->
                <div *ngIf="auth.isLoggedIn()" class="flex justify-center mt-8">
                    <button (click)="onCreateProject()" class="inline-flex items-center px-8 py-3 bg-secondary text-secondary-foreground font-black text-xs uppercase tracking-widest hover:scale-105 transition-all shadow-xl rounded-xl">
                        <lucide-icon [img]="PlusIcon" class="w-4 h-4 mr-2"></lucide-icon>
                        {{ 'projects.header.createProject' | translate }}
                    </button>
                </div>
            </div>

            <!-- Highlighted Projects -->
            <div *ngIf="!isLoading() && highlightedProjects().length > 0" class="pb-16">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 animate-fade-in-up" style="animation-delay: 0.1s">
                    <app-project-card 
                        *ngFor="let project of highlightedProjects(); let i = index"
                        [project]="project"
                        [allProjects]="projects()"
                        [showAdminActions]="true"
                        [showTrendingBadge]="true"
                        [showLatestBadge]="true"
                        [showFeaturedBadge]="true"
                        [showYearBadge]="true"
                        [showNiche]="true"
                        (edit)="onEditProject($event)"
                        (delete)="onDeleteProject($event)">
                    </app-project-card>
                </div>
            </div>

            <!-- Centralized Project CRUD Modals -->
            <app-project-crud-modal
                [open]="showCreateModal()"
                mode="create"
                (projectSaved)="onProjectSaved($event)"
                (modalClosed)="onModalClosed()">
            </app-project-crud-modal>

            <app-project-crud-modal
                [open]="showEditModal()"
                [project]="editingProject()"
                mode="edit"
                (projectSaved)="onProjectSaved($event)"
                (modalClosed)="onModalClosed()">
            </app-project-crud-modal>

            <app-project-delete-modal
                [isOpen]="showDeleteModal()"
                [project]="deletingProject()"
                (projectDeleted)="onProjectDeleted($event)"
                (modalClosed)="onModalClosed()">
            </app-project-delete-modal>

            <!-- View All Projects Button -->
            <div class="flex justify-center pb-16 animate-fade-in-up" style="animation-delay: 0.4s">
                <a routerLink="/projects/all"
                    class="group relative inline-flex items-center px-10 py-4 bg-primary text-primary-foreground font-black text-sm uppercase tracking-widest hover:scale-105 transition-all shadow-xl shadow-primary/20 overflow-hidden rounded-xl">
                    <span class="absolute inset-0 bg-primary-foreground/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></span>
                    <span class="relative">{{ 'projects.viewAll' | translate }}</span>
                    <span class="relative ml-3 bg-primary-foreground/20 text-xs font-black px-2.5 py-1 rounded-xl">
                        {{ totalProjectCount() }}
                    </span>
                    <lucide-icon [img]="ArrowRightIcon"
                        class="relative w-5 h-5 ml-3 group-hover:translate-x-1 transition-transform"></lucide-icon>
                </a>
            </div>

            <!-- Work History Section -->
            <div class="py-16 border-t border-border">
                <app-projects-work-history [experiences]="experiences()"
                    (experiencesUpdated)="onExperiencesUpdated($event)"></app-projects-work-history>
            </div>

            <!-- Brand Slider Section -->
            <app-projects-brand-slider [clients]="clients()"
                (clientsUpdated)="onClientsUpdated($event)"></app-projects-brand-slider>

            <!-- References Section -->
            <div class="py-16">
                <app-projects-references [testimonials]="testimonials()"
                    (testimonialsUpdated)="onTestimonialsUpdated($event)"></app-projects-references>
            </div>

        </div>
    </div>

    <!-- Bottom CTA - Full Width -->
    <div *ngIf="!isLoading() && !hasError() && projects().length > 0">
        <app-projects-bottom-cta></app-projects-bottom-cta>
    </div>
</main>

<!-- Footer -->
<app-shared-footer></app-shared-footer>
