<!-- Projects Grid -->
<section *ngIf="!hideGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in-up"
    style="animation-delay: 0.2s">
    <app-project-card 
        *ngFor="let project of projects" 
        [project]="project"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)">
    </app-project-card>
</section>

<!-- Edit/Create Modal -->
<ui-dialog-content 
    [open]="showEditModal" 
    (openChange)="showEditModal = $event"
    class="max-w-4xl">
    
    <ui-dialog-header>
        <ui-dialog-title>{{ isCreating ? 'Create Project' : 'Edit Project' }}</ui-dialog-title>
    </ui-dialog-header>

    <!-- Content -->
    <div class="space-y-6 overflow-y-auto custom-scrollbar flex-1 max-h-[70vh]">
        <!-- Import Manager (for creating new projects) -->
        <app-project-import-manager 
            *ngIf="isCreating"
            [(editingProject)]="editingProject"
            [(isImporting)]="isImporting"
            [(importUrl)]="importUrl"
            (responsibilitiesImported)="responsibilities = $event"
            (keyFeaturesImported)="keyFeatures = $event"
            (changelogImported)="changelog = $event">
        </app-project-import-manager>

        <!-- Basic Fields -->
        <app-project-form-basic 
            [project]="editingProject" 
            [submitted]="submitted">
        </app-project-form-basic>

        <!-- Categories & Niches -->
        <app-project-form-categories 
            [project]="editingProject"
            (manageCategoriesClick)="showCategoryManager = true"
            (manageNichesClick)="showNicheManager = true">
        </app-project-form-categories>

        <!-- Tags -->
        <app-project-form-tags 
            [(selectedTags)]="selectedTags">
        </app-project-form-tags>

        <!-- Images -->
        <app-project-form-images 
            [imageUrl]="editingProject.imageUrl"
            (imageUrlChange)="editingProject.imageUrl = $event"
            [(galleryImages)]="galleryImages">
        </app-project-form-images>

        <!-- Features, Responsibilities, and Changelog -->
        <app-project-features-manager
            [(keyFeatures)]="keyFeatures"
            [(responsibilities)]="responsibilities"
            [(changelog)]="changelog">
        </app-project-features-manager>

        <!-- Project Settings -->
        <ui-card class="p-4">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" [(ngModel)]="editingProject.isFeatured"
                    class="w-4 h-4 rounded border-zinc-300 dark:border-zinc-600 text-red-600 focus:ring-red-500 focus:ring-2">
                <span class="text-sm font-bold text-zinc-900 dark:text-white">Mark as Featured</span>
                <span class="text-[10px] text-zinc-500">- Highlight this project as featured</span>
            </label>
        </ui-card>
    </div>

    <!-- Footer -->
    <ui-dialog-footer>
        <ui-button variant="outline" (onClick)="closeEditModal()">
            Cancel
        </ui-button>
        <ui-button (onClick)="saveProject()" [disabled]="isSaving">
            <lucide-icon [img]="SaveIcon" class="w-3.5 h-3.5 mr-2"></lucide-icon>
            {{ isSaving ? 'Saving...' : 'Save' }}
        </ui-button>
    </ui-dialog-footer>
</ui-dialog-content>

<!-- Delete Confirmation Modal -->
<app-project-delete-modal 
    [project]="deleteProject"
    [isDeleting]="isDeleting"
    (confirm)="executeDelete()"
    (cancel)="deleteProject = null">
</app-project-delete-modal>

<!-- Category Manager Modal -->
<app-project-category-manager
    *ngIf="showCategoryManager"
    (categoriesUpdated)="showCategoryManager = false">
</app-project-category-manager>

<!-- Niche Manager Modal -->
<app-project-niche-manager
    *ngIf="showNicheManager"
    (nichesUpdated)="showNicheManager = false">
</app-project-niche-manager>
