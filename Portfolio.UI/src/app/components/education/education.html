<app-navbar></app-navbar>

<main [attr.dir]="translationService.isRTL() ? 'rtl' : 'ltr'"
    class="min-h-screen bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 transition-colors duration-500">

    <div class="max-w-7xl mx-auto px-6 relative z-10">

        <!-- Page Header -->
        <div class="pt-24 pb-6">
            <app-shared-page-header [badge]="'education.badge' | translate"
                [title]="('education.title1' | translate) + ' <span class=\'text-transparent bg-clip-text bg-gradient-to-r from-[#FF3B7E] to-[#7000FF]\'>' + ('education.title2' | translate) + '</span>'"
                [description]="'education.description' | translate">
            </app-shared-page-header>
        </div>

        <!-- SKELETON STATE -->
        <div *ngIf="isLoading()" class="space-y-6 pb-16">
            <!-- Education Card Skeleton -->
            <div
                class="bg-white dark:bg-zinc-900 rounded-2xl border border-zinc-200 dark:border-zinc-800 p-8 shadow-sm animate-pulse">
                <div class="flex items-center justify-between mb-6">
                    <div class="space-y-3">
                        <div class="h-8 bg-zinc-200 dark:bg-zinc-800 rounded-xl w-48"></div>
                        <div class="h-5 bg-zinc-200 dark:bg-zinc-800 rounded w-64"></div>
                    </div>
                    <div class="h-12 bg-zinc-200 dark:bg-zinc-800 rounded-xl w-32"></div>
                </div>
            </div>

            <!-- Training Card Skeleton -->
            <div
                class="bg-white dark:bg-zinc-900 rounded-2xl border border-zinc-200 dark:border-zinc-800 p-8 shadow-sm animate-pulse">
                <div class="flex items-center justify-between mb-6">
                    <div class="space-y-3">
                        <div class="h-8 bg-zinc-200 dark:bg-zinc-800 rounded-xl w-48"></div>
                        <div class="h-5 bg-zinc-200 dark:bg-zinc-800 rounded w-64"></div>
                    </div>
                    <div class="h-12 bg-zinc-200 dark:bg-zinc-800 rounded-xl w-32"></div>
                </div>
            </div>

            <!-- Certification Card Skeleton -->
            <div
                class="bg-white dark:bg-zinc-900 rounded-2xl border border-zinc-200 dark:border-zinc-800 p-8 shadow-sm animate-pulse">
                <div class="flex items-center justify-between mb-6">
                    <div class="space-y-3">
                        <div class="h-8 bg-zinc-200 dark:bg-zinc-800 rounded-xl w-48"></div>
                        <div class="h-5 bg-zinc-200 dark:bg-zinc-800 rounded w-64"></div>
                    </div>
                    <div class="h-12 bg-zinc-200 dark:bg-zinc-800 rounded-xl w-32"></div>
                </div>
            </div>

            <!-- Achievements Card Skeleton -->
            <div
                class="bg-white dark:bg-zinc-900 rounded-2xl border border-zinc-200 dark:border-zinc-800 p-8 shadow-sm animate-pulse">
                <div class="flex items-center justify-between mb-6">
                    <div class="space-y-3">
                        <div class="h-8 bg-zinc-200 dark:bg-zinc-800 rounded-xl w-48"></div>
                        <div class="h-5 bg-zinc-200 dark:bg-zinc-800 rounded w-64"></div>
                    </div>
                    <div class="h-12 bg-zinc-200 dark:bg-zinc-800 rounded-xl w-32"></div>
                </div>
            </div>
        </div>

        <!-- Specializations Skeleton -->
        <app-education-specializations-skeleton *ngIf="isLoading()"></app-education-specializations-skeleton>

        <!-- ERROR STATE -->
        <app-shared-error-state *ngIf="!isLoading() && hasError()" [title]="'education.errorTitle' | translate"
            [retryText]="'education.retryText' | translate" (retry)="ngOnInit()">
        </app-shared-error-state>

        <!-- EMPTY STATE -->
        <app-shared-empty-state *ngIf="!isLoading() && !hasError() && allEducation().length === 0"
            [title]="'education.emptyTitle' | translate" [message]="'education.emptyMessage' | translate">
        </app-shared-empty-state>

        <!-- CONTINUOUS TIMELINE -->
        <div *ngIf="!isLoading() && !hasError() && allEducation().length > 0"
            class="pb-16 space-y-12 relative before:absolute before:top-0 before:bottom-0 before:ltr:left-1/2 before:rtl:right-1/2 before:ltr:-translate-x-1/2 before:rtl:translate-x-1/2 before:w-0.5 before:bg-gradient-to-b before:from-zinc-200 before:via-zinc-300 before:to-zinc-200 dark:before:from-zinc-800 dark:before:via-zinc-700 dark:before:to-zinc-800">
            <!-- Education Section -->
            <div class="relative">
                <app-education-timeline [education]="educationList" sectionCategory="Education" [continuousMode]="true"
                    [sectionTitle]="'education.educationTitle' | translate"
                    [sectionDesc]="'education.educationDesc' | translate"
                    (educationUpdated)="onEducationUpdated($event)"></app-education-timeline>
            </div>

            <!-- Training Section -->
            <div class="relative" *ngIf="trainingList.length > 0">
                <app-education-timeline [education]="trainingList" sectionCategory="Training" [limitItems]="1"
                    [layoutStartIndex]="trainingStartIndex" [continuousMode]="true"
                    [sectionTitle]="'education.trainingTitle' | translate"
                    [sectionDesc]="'education.trainingDesc' | translate" [hasViewListBtn]="trainingList.length > 1"
                    [viewListText]="'education.viewList' | translate" (viewListClicked)="navigateToList('training')"
                    (educationUpdated)="onEducationUpdated($event)"></app-education-timeline>
            </div>

            <!-- Certification Section -->
            <div class="relative" *ngIf="certificationList.length > 0">
                <app-education-timeline [education]="certificationList" sectionCategory="Certification" [limitItems]="1"
                    [layoutStartIndex]="certificationStartIndex" [continuousMode]="true"
                    [sectionTitle]="'education.certificationTitle' | translate"
                    [sectionDesc]="'education.certificationDesc' | translate"
                    [hasViewListBtn]="certificationList.length > 1" [viewListText]="'education.viewList' | translate"
                    (viewListClicked)="navigateToList('certification')"
                    (educationUpdated)="onEducationUpdated($event)"></app-education-timeline>
            </div>

            <!-- Achievements Section -->
            <div class="relative" *ngIf="achievementList.length > 0">
                <app-education-timeline [education]="achievementList" sectionCategory="Achievement" [limitItems]="1"
                    [layoutStartIndex]="achievementStartIndex" [continuousMode]="true"
                    [sectionTitle]="'education.achievementTitle' | translate"
                    [sectionDesc]="'education.achievementDesc' | translate"
                    [hasViewListBtn]="achievementList.length > 1" [viewListText]="'education.viewList' | translate"
                    (viewListClicked)="navigateToList('achievement')"
                    (educationUpdated)="onEducationUpdated($event)"></app-education-timeline>
            </div>
        </div> <!-- end CONTINUOUS TIMELINE -->

        <!-- SPECIALIZATIONS -->
        <app-education-specializations [bio]="bio() || undefined"
            (bioUpdated)="onBioUpdated($event)"></app-education-specializations>

        <!-- Strategic Signature Section -->
        <app-shared-signature [bio]="bio()" [quote]="bio()?.educationQuote || ('education.defaultQuote' | translate)"
            (bioUpdated)="onBioUpdated($event)">
        </app-shared-signature>
    </div>
</main>

<!-- Footer -->
<app-shared-footer></app-shared-footer>
