<app-navbar></app-navbar>

<main
    class="min-h-screen bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 pt-32 transition-colors duration-500 overflow-hidden relative space-y-32">

    <!-- Animated Background Elements -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div
            class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-purple-500/5 dark:bg-purple-500/10 rounded-full blur-[120px] animate-pulse">
        </div>
        <div class="absolute top-[20%] -right-[10%] w-[35%] h-[35%] bg-pink-500/5 dark:bg-pink-500/10 rounded-full blur-[120px] animate-pulse"
            style="animation-delay: 2s"></div>
    </div>

    <div class="max-w-7xl mx-auto px-6 relative z-10 space-y-32">

        <!-- Header Section -->
        <app-shared-page-header badge="Knowledge Synthesis"
            title="ACADEMIC<br><span class='text-transparent bg-clip-text bg-gradient-to-r from-[#FF3B7E] to-[#7000FF]'>FOUNDATION</span>"
            description="Technical foundations and continuous specialization. The evolution of a system architect through rigorous inquiry and certification.">
        </app-shared-page-header>

        <!-- SKELETON STATE -->
        <app-shared-skeleton *ngIf="isLoading" [count]="3" height="300px"></app-shared-skeleton>

        <!-- ERROR STATE -->
        <app-shared-error-state *ngIf="!isLoading && hasError" title="Information Link Severed" retryText="Re-Link Data"
            (retry)="ngOnInit()">
        </app-shared-error-state>

        <!-- EMPTY STATE -->
        <app-shared-empty-state *ngIf="!isLoading && !hasError && allEducation.length === 0" 
            title="Awaiting Batching"
            message="Academic credentials and specialized training are being compiled for display.">
        </app-shared-empty-state>

        <!-- CONTINUOUS TIMELINE -->
        <app-education-timeline *ngIf="!isLoading && !hasError && allEducation.length > 0"
            [education]="allEducation" (educationUpdated)="onEducationUpdated($event)"></app-education-timeline>

        <!-- SPECIALIZATIONS -->
        <app-education-specializations [bio]="bio || undefined"></app-education-specializations>

        <!-- Strategic Signature Section -->
        <app-shared-signature [bio]="bio"
            [quote]="bio?.educationQuote || 'Education is the synthesis of inquiry and architecture. My academic foundation provides the rigorous framework through which I approach complex engineering challenges and innovative system design.'">
        </app-shared-signature>
    </div>

    <!-- Footer -->
    <app-shared-footer></app-shared-footer>
</main>
