<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Dev.M.Said - Full Stack Developer Portfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Dev.M.Said - Full Stack Developer specializing in .NET, Angular, and modern web technologies">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.svg">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.svg">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <link rel="manifest" href="site.webmanifest">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#dc2626">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Share+Tech&family=Changa:wght@200;300;400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Theme init: runs synchronously before paint to prevent FOUC -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('portfolio-theme');
        var isDark = saved ? saved === 'dark' : true;
        document.documentElement.classList.add(isDark ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <app-root></app-root>
</body>

</html>
