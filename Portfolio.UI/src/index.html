<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>PortfolioUI</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Theme init: runs synchronously before paint to prevent FOUC -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('portfolio-theme');
        var isDark = saved ? saved === 'dark' : true;
        document.documentElement.classList.add(isDark ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <app-root></app-root>
</body>

</html>
