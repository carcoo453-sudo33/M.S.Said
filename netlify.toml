[build]
  base = "Portfolio.UI"
  publish = "dist/portfolio.ui/browser"
  command = "npm ci && ./node_modules/.bin/ng build --configuration production"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_ENV = "production"
  NODE_VERSION = "20"
  NPM_VERSION = "10.9.2"
