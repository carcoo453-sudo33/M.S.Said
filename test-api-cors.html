<!DOCTYPE html>
<html>
<head>
    <title>API CORS Test</title>
</head>
<body>
    <h1>API CORS Test</h1>
    <button onclick="testAPI()">Test API Connection</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('https://m-protfolio.runasp.net/api/bio', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<pre style="color: green;">SUCCESS!\nStatus: ${response.status}\nData: ${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<pre style="color: orange;">Response received but not OK\nStatus: ${response.status}\nStatusText: ${response.statusText}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre style="color: red;">ERROR!\n${error.message}\n\nThis usually means:\n1. CORS is blocking the request\n2. The API server is not responding\n3. Network/DNS issue</pre>`;
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
