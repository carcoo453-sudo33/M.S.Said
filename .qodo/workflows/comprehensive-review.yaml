name: "Comprehensive Portfolio Review"
description: "Complete code review workflow for portfolio application"
version: "1.0.0"

# Workflow triggers
triggers:
  - pull_request
  - push_to_main
  - manual_trigger

# Workflow steps
steps:
  - name: "Initial Code Analysis"
    agent: "portfolio-reviewer"
    actions:
      - analyze_code_quality
      - check_coding_standards
      - validate_architecture
      
  - name: "Security Audit"
    agent: "security-auditor"
    actions:
      - scan_vulnerabilities
      - check_dependencies
      - validate_security_config
      
  - name: "Performance Analysis"
    actions:
      - frontend_performance_audit
      - backend_performance_check
      - database_query_analysis
      
  - name: "Accessibility Check"
    actions:
      - wcag_compliance_check
      - screen_reader_compatibility
      - keyboard_navigation_test
      
  - name: "Cross-Browser Testing"
    actions:
      - chrome_compatibility
      - firefox_compatibility
      - safari_compatibility
      - edge_compatibility
      
  - name: "Mobile Responsiveness"
    actions:
      - mobile_layout_check
      - touch_interaction_test
      - performance_on_mobile

# Quality gates
quality_gates:
  code_quality:
    min_score: 8.0
    required_checks:
      - no_critical_issues
      - test_coverage_above_80
      - no_security_vulnerabilities
      
  performance:
    frontend:
      lighthouse_score: 90
      bundle_size_limit: "2MB"
      first_contentful_paint: "1.5s"
      
    backend:
      response_time_p95: "200ms"
      memory_usage_limit: "512MB"
      cpu_usage_limit: "70%"

# Notification settings
notifications:
  on_failure:
    - slack_channel: "#dev-alerts"
    - email: "dev-team@company.com"
    
  on_success:
    - slack_channel: "#deployments"
    
# Reporting
reports:
  generate:
    - code_quality_report
    - security_audit_report
    - performance_report
    - accessibility_report
    
  format: ["html", "json", "pdf"]
  
  storage:
    location: "reports/"
    retention_days: 30