# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit AI Code Review Configuration
# https://coderabbit.ai/docs/configure

language: "en"

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: true
  auto_review:
    enabled: true
    drafts: false
  early_access: true
  tools:
    github_checks: true
  
  # Tone and global instructions
  tone_instructions: "Be professional, concise, and helpful."
  instructions: |
    Review the pull requests for a full-stack portfolio application with Angular 19 frontend and .NET 9 API.
    
    Key Focus Areas:
    - Code quality, readability, and maintainability
    - Performance optimization and best practices
    - Security vulnerabilities and data validation
    - API security and proper error handling
    - Proper separation of concerns and clean architecture

  # Targeted review guidelines for specific paths
  path_instructions:
    - path: "Portfolio.UI/src/app/components/**"
      instructions: |
        Angular Component Review Focus:
        - Standalone component pattern compliance
        - Proper lifecycle hook usage
        - Template accessibility (ARIA labels, semantic HTML)
        - Tailwind CSS class organization (avoid arbitrary values)
        
    - path: "Portfolio.UI/src/app/services/**"
      instructions: |
        Angular Service Review Focus:
        - Proper dependency injection patterns
        - HTTP error handling and retry logic
        - Observable stream management and memory leaks
        
    - path: "Portfolio.API/Controllers/**"
      instructions: |
        API Controller Review Focus:
        - RESTful API design principles
        - Input validation and sanitization
        - Proper HTTP status codes
        
    - path: "Portfolio.API/Infrastructure/Data/**"
      instructions: |
        Data Layer Review Focus:
        - Entity Framework performance (N+1 queries)
        - Database indexing strategies
        - Migration safety and rollback plans
        
    - path: "Portfolio.API/Domain/Entities/**"
      instructions: |
        Entity Review Focus:
        - Proper data annotations and constraints
        - Entity relationships and clean domain model

  # Exclude files to stay within the limit and focus on logic changes
  path_filters:
    - "!Portfolio.API/Infrastructure/Data/Migrations/**"
    - "!Portfolio.API/Migrations/**"
    - "!Portfolio.API/logs/**"
    - "!**/*.Designer.cs"
    - "!**/*.resx"
    - "!database/**"
    - "!Portfolio.API/migration-script.sql"
    - "!**/*.json"
    - "!**/*.md"
    - "!.github/workflows/**"
    - "!docker-compose.yml"
    - "!Dockerfile*"
    - "!Portfolio.API/Domain/Enums/**"
    - "!Portfolio.API/Constants/**"
    - "!Portfolio.API/Application/DTOs/**" # Legacy/Duplicate DTOs
    - "!Portfolio.API/Infrastructure/Data/Configurations/**"
    - "!Portfolio.API/Domain/Events/**"
    - "!Portfolio.API/Portfolio.API.http"
    - "!.dockerignore"

chat:
  auto_reply: true

knowledge_base:
  learnings:
    enabled: true

