name: .NET Core CI with Enhanced Testing

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'Portfolio.API/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Portfolio.API/**'

env:
  DOTNET_VERSION: '9.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Portfolio.API
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Run code analysis
      run: dotnet build --no-restore --verbosity normal /p:TreatWarningsAsErrors=true
    - name: Run security analysis
      run: |
        dotnet tool install --global security-scan
        security-scan Portfolio.API.csproj --excl-proj=**/*Test*.csproj
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Portfolio.API
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Run Snyk security scan
      uses: snyk/actions/dotnet@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  build-and-test:
    runs-on: ubuntu-latest
    needs: [code-analysis, security-scan]
    defaults:
      run:
        working-directory: ./Portfolio.API
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}
    - name: Run Unit Tests
      run: dotnet test --no-build --verbosity normal --configuration ${{ env.BUILD_CONFIGURATION }} --collect:"XPlat Code Coverage" --results-directory ./coverage
      continue-on-error: true
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        directory: ./Portfolio.API/coverage
        flags: backend
        name: dotnet-coverage

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: ./Portfolio.API
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}
    - name: Run Integration Tests
      run: dotnet test --no-build --verbosity normal --configuration ${{ env.BUILD_CONFIGURATION }} --filter "Category=Integration"
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Database=portfolio_test;Username=postgres;Password=postgres"
      continue-on-error: true

  api-security-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./Portfolio.API
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}
    - name: Start API for testing
      run: dotnet run --no-build --configuration ${{ env.BUILD_CONFIGURATION }} &
      env:
        ASPNETCORE_ENVIRONMENT: Testing
        ASPNETCORE_URLS: "http://0.0.0.0:5000"
    - name: Wait for API to be ready
      run: |
        echo "Waiting for API to start..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5000/health; then
            echo "API is ready after ${i} attempts"
            break
          fi
          echo "Attempt $i failed, retrying in 5s..."
          sleep 5
        done
        # Final check - fail clearly if API didn't start
        curl -sf http://localhost:5000/swagger/v1/swagger.json || (echo "Swagger not reachable!" && exit 1)
    - name: Run OWASP ZAP API Security Test
      uses: zaproxy/action-api-scan@v0.7.0
      with:
        target: 'http://localhost:5000/swagger/v1/swagger.json'
        format: openapi
        fail_action: false
