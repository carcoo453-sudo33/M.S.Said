name: Angular CI with Enhanced Testing

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'Portfolio.UI/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Portfolio.UI/**'

env:
  NODE_VERSION: '20.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Portfolio.UI
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: './Portfolio.UI/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Lint & Format Check
      run: |
        npm run lint --if-present
        npm run format:check --if-present
    - name: Build Production
      run: npm run build --if-present
    - name: Run Unit Tests
      run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
      continue-on-error: true
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        directory: ./Portfolio.UI/coverage
        flags: frontend
        name: angular-coverage

  security-scan:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Portfolio.UI
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: './Portfolio.UI/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Run npm audit
      run: npm audit --audit-level=moderate
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  accessibility-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./Portfolio.UI
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: './Portfolio.UI/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Build application
      run: npm run build
    - name: Run accessibility tests
      run: npm run test:a11y --if-present
      continue-on-error: true

  lighthouse-audit:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./Portfolio.UI
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: './Portfolio.UI/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Build application
      run: npm run build
    - name: Serve application
      run: |
        npm install -g http-server
        http-server dist/portfolio-ui -p 4200 &
        sleep 10
    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './Portfolio.UI/lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true
