<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testCors()">Test CORS</button>
    <button onclick="testImport()">Test GitHub Import</button>
    <pre id="output"></pre>

    <script>
        const output = document.getElementById('output');
        
        async function testCors() {
            output.textContent = 'Testing CORS...\n';
            try {
                const response = await fetch('http://localhost:5283/api/projects/test-cors');
                const data = await response.json();
                output.textContent += 'SUCCESS: ' + JSON.stringify(data, null, 2);
            } catch (error) {
                output.textContent += 'ERROR: ' + error.message + '\n' + error.stack;
            }
        }

        async function testImport() {
            output.textContent = 'Testing GitHub Import...\n';
            try {
                const response = await fetch('http://localhost:5283/api/projects/ebab0c7c-49ee-4172-a9bd-63e57d9ec2d1/import-from-github', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        gitHubUrl: 'https://github.com/microsoft/vscode'
                    })
                });
                const data = await response.json();
                output.textContent += 'SUCCESS: ' + JSON.stringify(data, null, 2);
            } catch (error) {
                output.textContent += 'ERROR: ' + error.message + '\n' + error.stack;
            }
        }
    </script>
</body>
</html>
